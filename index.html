<!DOCTYPE html>
<html>

<head>
    <title>Cosmic Painter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="stars"></div>

    <div class="card">

        <div class="glow"></div>

        <h1>Cosmic Painter</h1>

        <p class="subtitle">
            Secure Mod Portal
        </p>

        <button onclick="login()">
            Login With Discord
        </button>

        <input type="password"
               id="password"
               placeholder="Enter Password">

        <button onclick="unlock()">
            Unlock Download
        </button>

        <a id="download"
           href="/download"
           style="display:none;">
            Download Badge
        </a>

    </div>

    <script src="app.js"></script>

</body>
</html>
